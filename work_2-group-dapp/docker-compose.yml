services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: blockfund-frontend:latest
    container_name: blockfund-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      ORIGIN: http://blockfund.bahatijustin.dev
      PINATA_JWT: ${PINATA_JWT:-}
    ports:
      - "127.0.0.1:8088:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
